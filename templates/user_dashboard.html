<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>User Dashboard | LAKSHYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user_dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/user-dashboard.css') }}">
</head>
<body class="bg-slate-100 text-slate-800 antialiased h-screen flex flex-col">

    {% include 'partials/dashboard/header.html' %}

    <div class="flex-1 flex overflow-hidden">

    {% include 'partials/dashboard/filters.html' %}

    <button id="sidebarBackdrop" class="sidebar-backdrop" type="button" aria-label="Close filters" onclick="toggleSidebar(false)"></button>

    {% include 'partials/dashboard/content.html' %}
    </div>

    {% include 'partials/dashboard/student_modal.html' %}
    <script src="{{ url_for('static', filename='js/security/csrf.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/loading-state.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/chart-animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/core.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/filters.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/evaluation-chart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/student-modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/gender-chart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard/live-updates.js') }}"></script>
    
    <script>
        window.dashboardConfig = {
            maleCount: {{ stats.male or 0 }},
            femaleCount: {{ stats.female or 0 }}
        };
    </script>
    
</body>
</html>

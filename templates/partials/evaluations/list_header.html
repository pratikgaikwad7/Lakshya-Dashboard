    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm h-16 flex-shrink-0">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 h-full flex justify-between items-center">
            <div class="flex items-center gap-4">
                
                <!-- FILTER TOGGLE BUTTON -->
                <button id="evaluationFilterToggle" type="button" onclick="toggleSidebar()" aria-controls="filterSidebar" aria-expanded="false" class="lakshya-filter-toggle flex items-center gap-2 px-3 py-2 rounded-lg transition border">
                    <i class="fas fa-sliders-h"></i>
                    <span class="text-xs font-bold uppercase hidden sm:inline">Filters</span>
                    {% if filters.semester_status or filters.semester or filters.year or filters.ticket_no %}
                        <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                    {% endif %}
                </button>

                <div class="h-6 w-px bg-slate-200 hidden md:block"></div>
                
                <a href="/admin-dashboard" class="group flex items-center text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center mr-2 group-hover:bg-indigo-50 border border-slate-200">
                        <i class="fas fa-arrow-left text-slate-400 group-hover:text-indigo-600"></i>
                    </div>
                    <span class="hidden sm:inline font-semibold">Dashboard</span>
                </a>
                
                <div class="h-6 w-px bg-slate-200 hidden md:block"></div>
                
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-lg bg-indigo-600 flex items-center justify-center shadow-md">
                        <i class="fas fa-users text-white text-sm"></i>
                    </div>
                    <h1 class="text-lg font-bold text-slate-900">Evaluations List</h1>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <form method="POST" action="{{ url_for('auth.logout') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="text-slate-400 hover:text-red-600 text-sm font-medium transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>
